name: PR Quality Gates

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality-checks:
    name: Quality Gates (Linting + Testing + Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Run linting
        run: flutter analyze --no-pub

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Check coverage threshold (≥75%)
        run: dart run tool/check_coverage.dart coverage/lcov.info 75

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-verification:
    name: Build Verification (Android + iOS)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (dev debug)
        run: flutter build apk --flavor dev --debug

      - name: Build iOS (dev debug, no-codesign)
        run: flutter build ios --flavor dev --debug --no-codesign

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: build/app/outputs/apk/dev/debug/app-dev-debug.apk
          retention-days: 7
